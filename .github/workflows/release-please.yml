name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  GH_REPO: ${{ github.repository }}

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      cli_version: ${{ steps.release.outputs['cli--version'] }}
      cli_release_created: ${{ steps.release.outputs['cli--release_created'] }}
      mcp_version: ${{ steps.release.outputs['rust/arete-mcp--version'] }}
      mcp_release_created: ${{ steps.release.outputs['rust/arete-mcp--release_created'] }}
      idl_release_created: ${{ steps.release.outputs['arete-idl--release_created'] }}
      auth_release_created: ${{ steps.release.outputs['rust/arete-auth--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-rust:
    name: Publish Rust Crates to crates.io
    needs: release-please
    runs-on: ubuntu-latest
    if: needs.release-please.outputs.releases_created == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Login to crates.io
        run: cargo login ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Publish in dependency order with waits for crates.io index propagation
      - name: Publish arete-idl
        if: needs.release-please.outputs.idl_release_created == 'true'
        run: |
          cd arete-idl
          cargo publish --allow-dirty
          sleep 30

      - name: Publish arete-macros
        run: |
          cd arete-macros
          cargo publish --allow-dirty
          sleep 30

      - name: Publish arete-interpreter
        run: |
          cd interpreter
          cargo publish --allow-dirty
          sleep 30

      - name: Publish arete-auth
        if: needs.release-please.outputs.auth_release_created == 'true'
        run: |
          cd rust/arete-auth
          cargo publish --allow-dirty
          sleep 30

      - name: Publish arete-server
        run: |
          cd rust/arete-server
          cargo publish --allow-dirty
          sleep 30

      - name: Publish arete-a4-sdk
        run: |
          cd rust/arete-a4-sdk
          cargo publish --allow-dirty
          sleep 30

      - name: Publish arete (umbrella)
        run: |
          cd arete
          cargo publish --allow-dirty
          sleep 30

      - name: Publish a4-cli
        run: |
          cd cli
          cargo publish --allow-dirty
          sleep 30

      - name: Publish arete-mcp
        if: needs.release-please.outputs.mcp_release_created == 'true'
        run: |
          cd rust/arete-mcp
          cargo publish --allow-dirty
          sleep 30

  publish-npm:
    name: Publish to npm
    needs: release-please
    runs-on: ubuntu-latest
    if: needs.release-please.outputs.releases_created == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Publish @usearete/sdk (core) first since react depends on it
      - name: Install core dependencies
        run: npm install
        working-directory: typescript/core

      - name: Build core
        run: npm run build
        working-directory: typescript/core

      - name: Publish core
        run: npm publish --access public || echo "Package may already be published"
        working-directory: typescript/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Wait for npm registry to propagate
      - name: Wait for npm propagation
        run: sleep 30

      # Publish @usearete/react (after core is published)
      - name: Update react lockfile and install
        run: npm install ../core --no-save
        working-directory: typescript/react

      - name: Build react
        run: npm run build
        working-directory: typescript/react

      - name: Publish react
        run: npm publish --access public || echo "Package may already be published"
        working-directory: typescript/react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Wait for npm registry to propagate
      - name: Wait for npm propagation
        run: sleep 30

  bundle-templates:
    name: Bundle CLI Templates
    needs: [release-please, publish-npm, publish-rust]
    runs-on: ubuntu-latest
    if: needs.release-please.outputs.cli_release_created == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Prepare example templates
        run: |
          VERSION="${{ needs.release-please.outputs.cli_version }}"
          ./scripts/prepare-example-templates.sh "$VERSION"

      - name: Create templates tarball
        run: |
          VERSION="${{ needs.release-please.outputs.cli_version }}"
          echo "Bundling templates for version ${VERSION}"
          
          # Create tarball with only the template directories (excluding build artifacts)
          tar -czvf "arete-templates-v${VERSION}.tar.gz" \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.env' \
            --exclude='package-lock.json' \
            --exclude='target' \
            --exclude='Cargo.lock' \
            -C examples \
            ore-react \
            ore-rust \
            ore-typescript

      - name: Upload templates to CLI release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.release-please.outputs.cli_version }}"
          gh release upload "a4-cli-v${VERSION}" \
            "arete-templates-v${VERSION}.tar.gz" \
            --clobber

  build-cli-binaries:
    name: Build CLI Binaries
    needs: release-please
    if: needs.release-please.outputs.cli_release_created == 'true'
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: a4-darwin-arm64
          - os: macos-15-large
            target: x86_64-apple-darwin
            binary_name: a4-darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: a4-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: a4-linux-arm64
            cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: a4-win32-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        if: matrix.cross
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild

      - name: Build binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cargo zigbuild --release --target ${{ matrix.target }} --package a4-cli
          else
            cargo build --release --target ${{ matrix.target }} --package a4-cli
          fi
        shell: bash

      - name: Rename binary
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/a4.exe ${{ matrix.binary_name }}
          else
            cp target/${{ matrix.target }}/release/a4 ${{ matrix.binary_name }}
          fi
        shell: bash

      - name: Write checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ matrix.binary_name }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.binary_name }}" | Out-File -FilePath "${{ matrix.binary_name }}.sha256" -Encoding ascii

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-sha256-${{ matrix.binary_name }}
          path: ${{ matrix.binary_name }}.sha256

      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.release-please.outputs.cli_version }}"
          gh release upload "a4-cli-v${VERSION}" \
            "${{ matrix.binary_name }}" \
            --clobber
        shell: bash

  publish-cli-checksums:
    name: Publish CLI Checksums
    needs: [release-please, build-cli-binaries]
    runs-on: ubuntu-latest
    if: needs.release-please.outputs.cli_release_created == 'true'
    steps:
      - name: Download checksum artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: cli-sha256-*
          path: checksums
          merge-multiple: true

      - name: Combine checksums
        run: sort checksums/*.sha256 > checksums.txt

      - name: Upload checksums to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.release-please.outputs.cli_version }}"
          gh release upload "a4-cli-v${VERSION}" \
            "checksums.txt" \
            --clobber
        shell: bash

  build-mcp-binaries:
    name: Build MCP Binaries
    needs: release-please
    if: needs.release-please.outputs.mcp_release_created == 'true'
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: a4-mcp-darwin-arm64
          - os: macos-15-large
            target: x86_64-apple-darwin
            binary_name: a4-mcp-darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: a4-mcp-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: a4-mcp-linux-arm64
            cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: a4-mcp-win32-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        if: matrix.cross
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild

      - name: Build binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cargo zigbuild --release --target ${{ matrix.target }} --package arete-mcp
          else
            cargo build --release --target ${{ matrix.target }} --package arete-mcp
          fi
        shell: bash

      - name: Rename binary
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/a4-mcp.exe ${{ matrix.binary_name }}
          else
            cp target/${{ matrix.target }}/release/a4-mcp ${{ matrix.binary_name }}
          fi
        shell: bash

      - name: Write checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ matrix.binary_name }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.binary_name }}" | Out-File -FilePath "${{ matrix.binary_name }}.sha256" -Encoding ascii

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-sha256-${{ matrix.binary_name }}
          path: ${{ matrix.binary_name }}.sha256

      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.release-please.outputs.mcp_version }}"
          gh release upload "arete-mcp-v${VERSION}" \
            "${{ matrix.binary_name }}" \
            --clobber
        shell: bash

  publish-mcp-checksums:
    name: Publish MCP Checksums
    needs: [release-please, build-mcp-binaries]
    runs-on: ubuntu-latest
    if: needs.release-please.outputs.mcp_release_created == 'true'
    steps:
      - name: Download checksum artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: mcp-sha256-*
          path: checksums
          merge-multiple: true

      - name: Combine checksums
        run: sort checksums/*.sha256 > checksums.txt

      - name: Upload checksums to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.release-please.outputs.mcp_version }}"
          gh release upload "arete-mcp-v${VERSION}" \
            "checksums.txt" \
            --clobber
        shell: bash

  publish-npm-cli:
    name: Publish CLI to npm
    needs: [release-please, build-cli-binaries, publish-cli-checksums]
    runs-on: ubuntu-latest
    if: needs.release-please.outputs.cli_release_created == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish arete CLI wrapper
        run: npm publish --access public || echo "Package may already be published"
        working-directory: packages/arete
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-npm-mcp:
    name: Publish MCP to npm
    needs: [release-please, build-mcp-binaries, publish-mcp-checksums]
    runs-on: ubuntu-latest
    if: needs.release-please.outputs.mcp_release_created == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish arete MCP wrapper
        run: npm publish --access public || echo "Package may already be published"
        working-directory: packages/mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

