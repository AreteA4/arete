name: Release Recovery

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to recover (e.g. 0.5.0)"
        required: true
        type: string
      release_name:
        description: "Release name/tag override (default: a4-cli-v<version>)"
        required: false
        default: ""
        type: string
      mcp_release_name:
        description: "MCP release name/tag override (default: arete-mcp-v<version>)"
        required: false
        default: ""
        type: string
      run_bundle_templates:
        description: "Re-run template versioning, tarball, and upload"
        required: true
        default: true
        type: boolean
      run_build_binaries:
        description: "Re-run cross-platform CLI binary builds and upload"
        required: true
        default: true
        type: boolean
      run_publish_npm_cli:
        description: "Re-run npm publish for packages/arete"
        required: true
        default: true
        type: boolean
      run_build_mcp_binaries:
        description: "Re-run cross-platform MCP binary builds and upload"
        required: true
        default: true
        type: boolean
      run_publish_npm_mcp:
        description: "Re-run npm publish for packages/mcp"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  bundle-templates:
    name: Bundle CLI Templates
    runs-on: ubuntu-latest
    if: ${{ inputs.run_bundle_templates }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Prepare example templates
        run: |
          VERSION="${{ inputs.version }}"
          ./scripts/prepare-example-templates.sh "$VERSION"

      - name: Create templates tarball
        run: |
          VERSION="${{ inputs.version }}"
          echo "Bundling templates for version ${VERSION}"

          tar -czvf "arete-templates-v${VERSION}.tar.gz" \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.env' \
            --exclude='package-lock.json' \
            --exclude='target' \
            --exclude='Cargo.lock' \
            -C examples \
            ore-react \
            ore-rust \
            ore-typescript

      - name: Upload templates to CLI release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          RELEASE_NAME="${{ inputs.release_name }}"
          if [ -z "$RELEASE_NAME" ]; then
            RELEASE_NAME="a4-cli-v${VERSION}"
          fi

          gh release upload "$RELEASE_NAME" \
            "arete-templates-v${VERSION}.tar.gz" \
            --clobber

  build-cli-binaries:
    name: Build CLI Binaries
    if: ${{ inputs.run_build_binaries }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: a4-darwin-arm64
          - os: macos-15-large
            target: x86_64-apple-darwin
            binary_name: a4-darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: a4-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: a4-linux-arm64
            cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: a4-win32-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        if: ${{ matrix.cross }}
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild

      - name: Build binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cargo zigbuild --release --target ${{ matrix.target }} --package a4-cli
          else
            cargo build --release --target ${{ matrix.target }} --package a4-cli
          fi
        shell: bash

      - name: Rename binary
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/a4.exe ${{ matrix.binary_name }}
          else
            cp target/${{ matrix.target }}/release/a4 ${{ matrix.binary_name }}
          fi
        shell: bash

      - name: Write checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ matrix.binary_name }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.binary_name }}" | Out-File -FilePath "${{ matrix.binary_name }}.sha256" -Encoding ascii

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-sha256-${{ matrix.binary_name }}
          path: ${{ matrix.binary_name }}.sha256

      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          RELEASE_NAME="${{ inputs.release_name }}"
          if [ -z "$RELEASE_NAME" ]; then
            RELEASE_NAME="a4-cli-v${VERSION}"
          fi

          gh release upload "$RELEASE_NAME" \
            "${{ matrix.binary_name }}" \
            --clobber
        shell: bash

  publish-cli-checksums:
    name: Publish CLI Checksums
    needs: build-cli-binaries
    runs-on: ubuntu-latest
    if: ${{ inputs.run_build_binaries }}
    steps:
      - name: Download checksum artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: cli-sha256-*
          path: checksums
          merge-multiple: true

      - name: Combine checksums
        run: sort checksums/*.sha256 > checksums.txt

      - name: Upload checksums to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          RELEASE_NAME="${{ inputs.release_name }}"
          if [ -z "$RELEASE_NAME" ]; then
            RELEASE_NAME="a4-cli-v${VERSION}"
          fi

          gh release upload "$RELEASE_NAME" \
            "checksums.txt" \
            --clobber
        shell: bash

  publish-npm-cli:
    name: Publish CLI to npm
    needs: [build-cli-binaries, publish-cli-checksums]
    runs-on: ubuntu-latest
    if: ${{ always() && inputs.run_publish_npm_cli && (needs.build-cli-binaries.result == 'success' || needs.build-cli-binaries.result == 'skipped') && (needs.publish-cli-checksums.result == 'success' || needs.publish-cli-checksums.result == 'skipped') }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish arete CLI wrapper
        run: npm publish --access public || echo "Package may already be published"
        working-directory: packages/arete
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-mcp-binaries:
    name: Build MCP Binaries
    if: ${{ inputs.run_build_mcp_binaries }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: a4-mcp-darwin-arm64
          - os: macos-15-large
            target: x86_64-apple-darwin
            binary_name: a4-mcp-darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: a4-mcp-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: a4-mcp-linux-arm64
            cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: a4-mcp-win32-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        if: ${{ matrix.cross }}
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild

      - name: Build binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cargo zigbuild --release --target ${{ matrix.target }} --package arete-mcp
          else
            cargo build --release --target ${{ matrix.target }} --package arete-mcp
          fi
        shell: bash

      - name: Rename binary
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/a4-mcp.exe ${{ matrix.binary_name }}
          else
            cp target/${{ matrix.target }}/release/a4-mcp ${{ matrix.binary_name }}
          fi
        shell: bash

      - name: Write checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ matrix.binary_name }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.binary_name }}" | Out-File -FilePath "${{ matrix.binary_name }}.sha256" -Encoding ascii

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-sha256-${{ matrix.binary_name }}
          path: ${{ matrix.binary_name }}.sha256

      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          RELEASE_NAME="${{ inputs.mcp_release_name }}"
          if [ -z "$RELEASE_NAME" ]; then
            RELEASE_NAME="arete-mcp-v${VERSION}"
          fi

          gh release upload "$RELEASE_NAME" \
            "${{ matrix.binary_name }}" \
            --clobber
        shell: bash

  publish-mcp-checksums:
    name: Publish MCP Checksums
    needs: build-mcp-binaries
    runs-on: ubuntu-latest
    if: ${{ inputs.run_build_mcp_binaries }}
    steps:
      - name: Download checksum artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: mcp-sha256-*
          path: checksums
          merge-multiple: true

      - name: Combine checksums
        run: sort checksums/*.sha256 > checksums.txt

      - name: Upload checksums to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          RELEASE_NAME="${{ inputs.mcp_release_name }}"
          if [ -z "$RELEASE_NAME" ]; then
            RELEASE_NAME="arete-mcp-v${VERSION}"
          fi

          gh release upload "$RELEASE_NAME" \
            "checksums.txt" \
            --clobber
        shell: bash

  publish-npm-mcp:
    name: Publish MCP to npm
    needs: [build-mcp-binaries, publish-mcp-checksums]
    runs-on: ubuntu-latest
    if: ${{ always() && inputs.run_publish_npm_mcp && (needs.build-mcp-binaries.result == 'success' || needs.build-mcp-binaries.result == 'skipped') && (needs.publish-mcp-checksums.result == 'success' || needs.publish-mcp-checksums.result == 'skipped') }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish arete MCP wrapper
        run: npm publish --access public || echo "Package may already be published"
        working-directory: packages/mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
